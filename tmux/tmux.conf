# Custom Options

# Allow passthrough for Kitty graphics protocol (image previews in ranger, etc.)
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# Set window title (controlled by shell via escape sequences)
set -g set-titles on
set -g set-titles-string "#T"
set -g allow-rename on

# Disable status bar (re-enable with a keybind)
set -g status off

# Ctrl-Space as prefix
unbind C-b
set-option -g prefix C-Space
bind C-Space send-prefix

# Set repeat timeout to 200ms (from default 500ms)
set -g repeat-time 200

# Enable mouse wheel scrolling
set -g mouse on

# Copy mouse selection to Wayland clipboard
set -g copy-command 'wl-copy'
bind -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel

# Pane Splitting
unbind \%
unbind \"
unbind Enter
unbind \\
unbind v
unbind x
bind \\ split-window -h -c "#{pane_current_path}"
bind Enter split-window -c "#{pane_current_path}"

# Pane Switching
unbind h
unbind j
unbind k
unbind l
unbind z
unbind C-k
unbind C-j
unbind C-h
unbind C-l
bind -r C-k resize-pane -U
bind -r C-j resize-pane -D
bind -r C-h resize-pane -L
bind -r C-l resize-pane -R
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R
bind x kill-pane
unbind Up
unbind Down
unbind Left
unbind Right
unbind C-Up
unbind C-Down
unbind C-Left
unbind C-Right

